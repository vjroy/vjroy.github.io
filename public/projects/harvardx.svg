<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860" width="1280" height="860" font-family="Helvetica, Arial, sans-serif">
  <rect width="1280" height="860" fill="#11161d"/>
  <!-- window chrome -->
  <rect width="1280" height="56" fill="#1a212b"/>
  <circle cx="34" cy="28" r="6" fill="#33404f"/>
  <circle cx="56" cy="28" r="6" fill="#33404f"/>
  <circle cx="78" cy="28" r="6" fill="#33404f"/>
  <text x="640" y="33" fill="#6a7686" font-size="15" text-anchor="middle" letter-spacing="1">data-science</text>

  <text x="80" y="150" fill="#eef2f6" font-size="46" font-family="Georgia, serif" letter-spacing="-1">The math behind ML</text>
  <text x="80" y="190" fill="#8593a3" font-size="20">Calculus · statistics · probability · linear algebra</text>

  <!-- scatter / clustering panel -->
  <rect x="80" y="240" width="540" height="500" rx="14" fill="#1a212b"/>
  <text x="104" y="284" fill="#6a7686" font-size="14" letter-spacing="2">CLUSTERING</text>
  <g stroke="#27313d" stroke-width="1">
    <path d="M120 690 H600 M120 560 H600 M120 430 H600 M120 340 H600"/>
  </g>
  <g>
    <!-- cluster A (sage) -->
    <g fill="#96b59f">
      <circle cx="200" cy="620" r="7"/><circle cx="230" cy="650" r="7"/><circle cx="250" cy="600" r="7"/>
      <circle cx="210" cy="585" r="7"/><circle cx="270" cy="635" r="7"/><circle cx="185" cy="650" r="7"/>
      <circle cx="245" cy="660" r="7"/>
    </g>
    <!-- cluster B (blue) -->
    <g fill="#6f9fd8">
      <circle cx="420" cy="420" r="7"/><circle cx="450" cy="450" r="7"/><circle cx="470" cy="400" r="7"/>
      <circle cx="430" cy="385" r="7"/><circle cx="490" cy="435" r="7"/><circle cx="405" cy="455" r="7"/>
      <circle cx="465" cy="465" r="7"/>
    </g>
    <!-- cluster C (amber) -->
    <g fill="#d8a85f">
      <circle cx="320" cy="520" r="7"/><circle cx="350" cy="500" r="7"/><circle cx="300" cy="495" r="7"/>
      <circle cx="335" cy="540" r="7"/><circle cx="365" cy="525" r="7"/>
    </g>
  </g>

  <!-- distribution / bell curve panel -->
  <rect x="640" y="240" width="560" height="232" rx="14" fill="#1a212b"/>
  <text x="664" y="284" fill="#6a7686" font-size="14" letter-spacing="2">DISTRIBUTION</text>
  <path d="M680 440 C 820 440, 840 320, 920 320 S 1020 440, 1160 440" fill="none" stroke="#96b59f" stroke-width="4"/>
  <path d="M680 440 C 820 440, 840 320, 920 320 S 1020 440, 1160 440 L1160 440 L680 440 Z" fill="#96b59f" opacity="0.12"/>
  <line x1="920" y1="320" x2="920" y2="440" stroke="#27313d" stroke-dasharray="5 5"/>

  <!-- gradient descent / line panel -->
  <rect x="640" y="508" width="560" height="232" rx="14" fill="#1a212b"/>
  <text x="664" y="552" fill="#6a7686" font-size="14" letter-spacing="2">GRADIENT DESCENT</text>
  <path d="M680 560 C 760 720, 900 700, 1160 600" fill="none" stroke="#27313d" stroke-width="2"/>
  <path d="M690 580 L760 690 L840 660 L930 695 L1030 645 L1160 612" fill="none" stroke="#6f9fd8" stroke-width="3"/>
  <g fill="#6f9fd8">
    <circle cx="690" cy="580" r="6"/><circle cx="760" cy="690" r="6"/><circle cx="840" cy="660" r="6"/>
    <circle cx="930" cy="695" r="6"/><circle cx="1030" cy="645" r="6"/><circle cx="1160" cy="612" r="6"/>
  </g>

  <!-- tool chips -->
  <g font-size="15" fill="#8593a3">
    <rect x="80" y="772" width="120" height="40" rx="20" fill="none" stroke="#27313d"/><text x="140" y="797" text-anchor="middle">Python</text>
    <rect x="212" y="772" width="150" height="40" rx="20" fill="none" stroke="#27313d"/><text x="287" y="797" text-anchor="middle">scikit-learn</text>
    <rect x="374" y="772" width="110" height="40" rx="20" fill="none" stroke="#27313d"/><text x="429" y="797" text-anchor="middle">NumPy</text>
    <rect x="496" y="772" width="150" height="40" rx="20" fill="none" stroke="#27313d"/><text x="571" y="797" text-anchor="middle">TensorFlow</text>
  </g>
</svg>
